<!DOCTYPE html>
<html>
<head>
    <title>Campus Lost & Found - Welcome</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111827;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 32px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #6B7280;
        }

        .feature-icon {
            font-size: 20px;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #9CA3AF;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .icon-wrapper {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <div class="icon-wrapper">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8H36C37.1046 8 38 8.89543 38 10V14H10V10C10 8.89543 10.8954 8 12 8Z" fill="white" opacity="0.8"/>
                <path d="M10 16H38V36C38 37.1046 37.1046 38 36 38H12C10.8954 38 10 37.1046 10 36V16Z" fill="white"/>
                <path d="M18 22H30V24H18V22Z" fill="#667eea" opacity="0.7"/>
                <path d="M18 28H30V30H18V28Z" fill="#667eea" opacity="0.7"/>
            </svg>
        </div>

        <h1>Campus Lost & Found</h1>
        <p class="subtitle">Help return lost items to their owners and find your belongings</p>

        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">📤</span>
                <span>Report found items with photos and location</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔍</span>
                <span>Search for your lost belongings</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✅</span>
                <span>Submit claims with proof of ownership</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📋</span>
                <span>Admin review and approval system</span>
            </div>
        </div>

        <button class="btn btn-primary" onclick="enterDashboard()">
            Get Started
        </button>

        <div class="footer">
            <p>Campus Lost & Found • Making campus safer since 2026</p>
        </div>
    </div>
</div>

<script>
function enterDashboard() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
