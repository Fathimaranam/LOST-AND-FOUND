<!DOCTYPE html>
<html>
<head>
    <title>Campus Lost & Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom right, #dfe9f3, #ffffff);
    font-family: 'Poppins', sans-serif;
    text-align: center;
    transition: opacity 0.5s ease;   /* ADD THIS LINE */
}

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-weight: 600;
            color: #0d2b52;
            margin-bottom: 30px;
        }

        .enter-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(to right, #4facfe, #00c6ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .enter-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/679/679720.png" class="logo">

    <h1>Campus Lost & Found</h1>

    <button class="enter-btn" onclick="enterDashboard()">
        Enter Dashboard
    </button>
</div>

<script>
function enterDashboard() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
