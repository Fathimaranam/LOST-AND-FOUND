<!DOCTYPE html>
<html>
<head>
    <title>Campus Lost & Found - Sign Up</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            background: #F9FAFB;
        }

        /* ========== LEFT SECTION ========== */
        .left-section {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
        }

        .left-section h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .left-section p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* ========== RIGHT SECTION ========== */
        .right-section {
            flex: 1;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .signup-box {
            width: 100%;
            max-width: 420px;
        }

        .signup-header {
            margin-bottom: 32px;
        }

        .signup-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .signup-header p {
            font-size: 14px;
            color: #6B7280;
        }

        /* ========== FORM INPUTS ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #111827;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #9CA3AF;
        }

        /* ========== SIGNUP BUTTON ========== */
        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        /* ========== LOGIN LINK ========== */
        .login-link {
            text-align: center;
            font-size: 14px;
            color: #6B7280;
        }

        .login-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .left-section {
                flex: 0 0 auto;
                padding: 40px 24px;
            }

            .right-section {
                flex: 1;
                padding: 24px;
            }

            .left-section h1 {
                font-size: 28px;
            }

            .left-section p {
                font-size: 16px;
            }

            .icon-wrapper {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }

        @media (max-width: 480px) {
            .right-section {
                padding: 16px;
            }

            .signup-box {
                max-width: 100%;
            }

            .signup-header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="left-section">
        <div class="icon-wrapper">
            <svg width="60" height="60" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8H36C37.1046 8 38 8.89543 38 10V14H10V10C10 8.89543 10.8954 8 12 8Z" fill="white" opacity="0.8"/>
                <path d="M10 16H38V36C38 37.1046 37.1046 38 36 38H12C10.8954 38 10 37.1046 10 36V16Z" fill="white"/>
                <path d="M18 22H30V24H18V22Z" fill="rgba(255, 255, 255, 0.6)"/>
                <path d="M18 28H30V30H18V28Z" fill="rgba(255, 255, 255, 0.6)"/>
            </svg>
        </div>
        <h1>Campus Lost & Found</h1>
        <p>Join our community to help recover lost items</p>
    </div>

    <div class="right-section">
        <div class="signup-box">
            <div class="signup-header">
                <h2>Create Account</h2>
                <p>Sign up to start reporting and claiming items</p>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your@tkmce.ac.in">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <button class="signup-btn" onclick="register()">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

<script>
function register() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!name || !email || !phone || !password) {
        alert("Please fill in all fields");
        return;
    }

    fetch("http://localhost:3000/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name: name,
            email: email,
            phone: phone,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        if (data.message.includes("successfully")) {
            window.location.href = "login.html";
        }
    })
    .catch(() => alert("Registration failed"));
}
</script>

</body>
</html>
